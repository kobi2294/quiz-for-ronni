<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מתרגלים חשבון</title>
  <meta name="description" content="אתר תרגול חשבון מקומי בעברית מלאה עם RTL תקין, משימות, סטטיסטיקות ומעקב התקדמות.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&family=Rubik:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <svg class="bg-shapes" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
    <defs>
      <filter id="bg-blur"><feGaussianBlur stdDeviation="40"/></filter>
      <filter id="bg-blur-sm"><feGaussianBlur stdDeviation="25"/></filter>
    </defs>
    <!-- large soft blobs -->
    <ellipse cx="180" cy="160" rx="200" ry="180" fill="rgba(156,110,255,0.09)" filter="url(#bg-blur)"/>
    <ellipse cx="1260" cy="120" rx="220" ry="160" fill="rgba(108,141,255,0.10)" filter="url(#bg-blur)"/>
    <ellipse cx="720" cy="750" rx="260" ry="180" fill="rgba(255,107,175,0.08)" filter="url(#bg-blur)"/>
    <ellipse cx="1100" cy="680" rx="180" ry="200" fill="rgba(47,181,159,0.08)" filter="url(#bg-blur)"/>
    <ellipse cx="350" cy="600" rx="170" ry="140" fill="rgba(255,200,87,0.09)" filter="url(#bg-blur)"/>
    <!-- medium accents -->
    <circle cx="950" cy="350" r="90" fill="rgba(156,110,255,0.06)" filter="url(#bg-blur-sm)"/>
    <circle cx="200" cy="420" r="70" fill="rgba(108,141,255,0.07)" filter="url(#bg-blur-sm)"/>
    <circle cx="1300" cy="480" r="80" fill="rgba(255,200,87,0.07)" filter="url(#bg-blur-sm)"/>
    <!-- subtle rings -->
    <circle cx="500" cy="200" r="60" fill="none" stroke="rgba(156,110,255,0.08)" stroke-width="2"/>
    <circle cx="1050" cy="550" r="45" fill="none" stroke="rgba(255,107,175,0.07)" stroke-width="2"/>
    <circle cx="300" cy="780" r="35" fill="none" stroke="rgba(47,181,159,0.08)" stroke-width="2"/>
    <!-- tiny dots cluster -->
    <circle cx="680" cy="140" r="4" fill="rgba(255,200,87,0.18)"/>
    <circle cx="705" cy="125" r="3" fill="rgba(156,110,255,0.16)"/>
    <circle cx="660" cy="155" r="3.5" fill="rgba(255,107,175,0.14)"/>
    <circle cx="850" cy="480" r="3" fill="rgba(108,141,255,0.16)"/>
    <circle cx="870" cy="465" r="4" fill="rgba(47,181,159,0.14)"/>
    <circle cx="140" cy="300" r="3.5" fill="rgba(255,200,87,0.15)"/>
    <circle cx="160" cy="285" r="3" fill="rgba(156,110,255,0.14)"/>
    <!-- soft diamond -->
    <polygon points="1350,260 1380,300 1350,340 1320,300" fill="rgba(255,200,87,0.06)" filter="url(#bg-blur-sm)"/>
    <!-- wavy line accents -->
    <path d="M60,500 Q200,460 340,500 T620,500" fill="none" stroke="rgba(156,110,255,0.05)" stroke-width="2"/>
    <path d="M900,200 Q1040,170 1180,200 T1440,180" fill="none" stroke="rgba(47,181,159,0.05)" stroke-width="2"/>
  </svg>

  <div class="floating-deco" aria-hidden="true">
    <!-- stars -->
    <svg class="fdeco" style="top:20%;left:25%;--dur:13s;--delay:0s;--drift:40px;--rot:360deg" width="70" height="70" viewBox="0 0 60 60"><polygon points="30,2 36,22 56,22 40,34 46,54 30,42 14,54 20,34 4,22 24,22" fill="var(--purple)" opacity=".35"/></svg>
    <svg class="fdeco" style="top:55%;right:20%;--dur:16s;--delay:3s;--drift:35px;--rot:-360deg" width="55" height="55" viewBox="0 0 60 60"><polygon points="30,2 36,22 56,22 40,34 46,54 30,42 14,54 20,34 4,22 24,22" fill="var(--gold)" opacity=".30"/></svg>
    <svg class="fdeco" style="top:78%;left:35%;--dur:11s;--delay:7s;--drift:30px;--rot:360deg" width="45" height="45" viewBox="0 0 60 60"><polygon points="30,2 36,22 56,22 40,34 46,54 30,42 14,54 20,34 4,22 24,22" fill="var(--sky)" opacity=".28"/></svg>
    <svg class="fdeco" style="top:10%;right:30%;--dur:14s;--delay:5s;--drift:45px;--rot:-360deg" width="60" height="60" viewBox="0 0 60 60"><polygon points="30,2 36,22 56,22 40,34 46,54 30,42 14,54 20,34 4,22 24,22" fill="var(--pink)" opacity=".32"/></svg>
    <!-- hearts -->
    <svg class="fdeco" style="top:35%;left:15%;--dur:15s;--delay:1s;--drift:38px;--rot:-360deg" width="65" height="65" viewBox="0 0 60 55"><path d="M30 50 C12 36 0 24 0 14 0 6 6 0 14 0c5 0 10 3 13 8h6C36 3 41 0 46 0c8 0 14 6 14 14 0 10-12 22-30 36z" fill="var(--pink)" opacity=".33"/></svg>
    <svg class="fdeco" style="top:65%;right:28%;--dur:12s;--delay:4s;--drift:42px;--rot:360deg" width="50" height="50" viewBox="0 0 60 55"><path d="M30 50 C12 36 0 24 0 14 0 6 6 0 14 0c5 0 10 3 13 8h6C36 3 41 0 46 0c8 0 14 6 14 14 0 10-12 22-30 36z" fill="var(--purple)" opacity=".28"/></svg>
    <svg class="fdeco" style="top:12%;left:40%;--dur:17s;--delay:6s;--drift:35px;--rot:360deg" width="40" height="40" viewBox="0 0 60 55"><path d="M30 50 C12 36 0 24 0 14 0 6 6 0 14 0c5 0 10 3 13 8h6C36 3 41 0 46 0c8 0 14 6 14 14 0 10-12 22-30 36z" fill="var(--gold)" opacity=".30"/></svg>
    <svg class="fdeco" style="top:85%;right:15%;--dur:14s;--delay:2.5s;--drift:32px;--rot:-360deg" width="55" height="55" viewBox="0 0 60 55"><path d="M30 50 C12 36 0 24 0 14 0 6 6 0 14 0c5 0 10 3 13 8h6C36 3 41 0 46 0c8 0 14 6 14 14 0 10-12 22-30 36z" fill="var(--teal)" opacity=".25"/></svg>
    <!-- smileys -->
    <svg class="fdeco" style="top:42%;left:30%;--dur:14s;--delay:2s;--drift:36px;--rot:-360deg" width="60" height="60" viewBox="0 0 60 60"><circle cx="30" cy="30" r="28" fill="var(--gold)" opacity=".30"/><circle cx="20" cy="24" r="3.5" fill="var(--text)" opacity=".30"/><circle cx="40" cy="24" r="3.5" fill="var(--text)" opacity=".30"/><path d="M18 36 Q30 48 42 36" fill="none" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round" opacity=".28"/></svg>
    <svg class="fdeco" style="top:70%;left:22%;--dur:11s;--delay:5.5s;--drift:30px;--rot:360deg" width="50" height="50" viewBox="0 0 60 60"><circle cx="30" cy="30" r="28" fill="var(--orange)" opacity=".28"/><circle cx="20" cy="24" r="3.5" fill="var(--text)" opacity=".28"/><circle cx="40" cy="24" r="3.5" fill="var(--text)" opacity=".28"/><path d="M18 36 Q30 48 42 36" fill="none" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round" opacity=".26"/></svg>
    <svg class="fdeco" style="top:25%;right:22%;--dur:16s;--delay:8s;--drift:40px;--rot:-360deg" width="48" height="48" viewBox="0 0 60 60"><circle cx="30" cy="30" r="28" fill="var(--teal)" opacity=".25"/><circle cx="20" cy="24" r="3.5" fill="var(--text)" opacity=".26"/><circle cx="40" cy="24" r="3.5" fill="var(--text)" opacity=".26"/><path d="M18 36 Q30 48 42 36" fill="none" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round" opacity=".24"/></svg>
    <!-- sparkle bursts -->
    <svg class="fdeco" style="top:48%;right:35%;--dur:10s;--delay:1.5s;--drift:38px;--rot:360deg" width="55" height="55" viewBox="0 0 60 60"><path d="M30 4 L33 24 L52 18 L36 30 L52 42 L33 36 L30 56 L27 36 L8 42 L24 30 L8 18 L27 24Z" fill="var(--sky)" opacity=".30"/></svg>
    <svg class="fdeco" style="top:8%;left:32%;--dur:13s;--delay:4.5s;--drift:34px;--rot:-360deg" width="45" height="45" viewBox="0 0 60 60"><path d="M30 4 L33 24 L52 18 L36 30 L52 42 L33 36 L30 56 L27 36 L8 42 L24 30 L8 18 L27 24Z" fill="var(--pink)" opacity=".28"/></svg>
    <svg class="fdeco" style="top:60%;left:42%;--dur:15s;--delay:6.5s;--drift:42px;--rot:360deg" width="50" height="50" viewBox="0 0 60 60"><path d="M30 4 L33 24 L52 18 L36 30 L52 42 L33 36 L30 56 L27 36 L8 42 L24 30 L8 18 L27 24Z" fill="var(--purple)" opacity=".25"/></svg>
    <svg class="fdeco" style="top:90%;left:50%;--dur:12s;--delay:3.5s;--drift:36px;--rot:360deg" width="40" height="40" viewBox="0 0 60 60"><path d="M30 4 L33 24 L52 18 L36 30 L52 42 L33 36 L30 56 L27 36 L8 42 L24 30 L8 18 L27 24Z" fill="var(--gold)" opacity=".32"/></svg>
    <!-- extra large center shapes -->
    <svg class="fdeco" style="top:38%;left:45%;--dur:18s;--delay:0.5s;--drift:50px;--rot:360deg" width="100" height="100" viewBox="0 0 60 60"><polygon points="30,2 36,22 56,22 40,34 46,54 30,42 14,54 20,34 4,22 24,22" fill="var(--purple)" opacity=".18"/></svg>
    <svg class="fdeco" style="top:58%;left:55%;--dur:19s;--delay:9s;--drift:44px;--rot:-360deg" width="90" height="90" viewBox="0 0 60 55"><path d="M30 50 C12 36 0 24 0 14 0 6 6 0 14 0c5 0 10 3 13 8h6C36 3 41 0 46 0c8 0 14 6 14 14 0 10-12 22-30 36z" fill="var(--pink)" opacity=".16"/></svg>
  </div>

  <div class="app-shell">
    <header class="site-header">
      <div class="header-banner" id="homeShortcut" role="button" tabindex="0">
        <svg class="header-rainbow" viewBox="0 0 800 200" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <linearGradient id="rainbow1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff6baf"/>
              <stop offset="25%" stop-color="#9c6eff"/>
              <stop offset="50%" stop-color="#6c8dff"/>
              <stop offset="75%" stop-color="#2fb59f"/>
              <stop offset="100%" stop-color="#ffc857"/>
            </linearGradient>
            <linearGradient id="rainbow2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ffc857"/>
              <stop offset="25%" stop-color="#ff8d4d"/>
              <stop offset="50%" stop-color="#ff6baf"/>
              <stop offset="75%" stop-color="#9c6eff"/>
              <stop offset="100%" stop-color="#6c8dff"/>
            </linearGradient>
            <linearGradient id="rainbow3" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#6c8dff"/>
              <stop offset="30%" stop-color="#2fb59f"/>
              <stop offset="60%" stop-color="#ffc857"/>
              <stop offset="100%" stop-color="#ff6baf"/>
            </linearGradient>
          </defs>
          <path d="M -20 200 Q 400 -60 820 200" fill="none" stroke="url(#rainbow1)" stroke-width="6" opacity="0.5" class="rainbow-arc rainbow-arc-1"/>
          <path d="M -20 200 Q 400 -30 820 200" fill="none" stroke="url(#rainbow2)" stroke-width="5" opacity="0.4" class="rainbow-arc rainbow-arc-2"/>
          <path d="M -20 200 Q 400 0 820 200" fill="none" stroke="url(#rainbow3)" stroke-width="4" opacity="0.3" class="rainbow-arc rainbow-arc-3"/>
        </svg>
        <div class="header-content">
          <div class="header-icons">
            <span class="header-icon header-icon-1">🧮</span>
            <span class="header-icon header-icon-2">✏️</span>
            <span class="header-icon header-icon-3">⭐</span>
            <span class="header-icon header-icon-4">🎯</span>
          </div>
          <h1 class="header-title">מתרגלים חשבון</h1>
          <p class="header-subtitle">בואו נשחק עם מספרים</p>
        </div>
      </div>

      <nav class="header-actions" aria-label="ניווט ראשי">
        <button type="button" class="ghost-button" id="progressShortcut">ההתקדמות שלי</button>
      </nav>
    </header>

    <main id="app" aria-live="polite"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
